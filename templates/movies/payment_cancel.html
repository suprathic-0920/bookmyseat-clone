{% extends "users/basic.html" %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 gsap-fade-up">
            <div class="card shadow border-0" style="background-color: var(--surface-light);">
                <div class="card-body py-5">
                    <i class="fas fa-times-circle text-danger mb-4" style="font-size: 5rem;"></i>
                    <h2 class="text-white mb-3">Payment Cancelled</h2>
                    <p class="text-muted mb-4">You have cancelled the checkout process. No charges were made.</p>
                    
                    <a href="{% url 'movie_list' %}" class="btn btn-outline-light btn-lg rounded-pill px-5">
                        Back to Movies
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
