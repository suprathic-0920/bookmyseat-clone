{% extends "users/basic.html" %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 gsap-fade-up">
            <div class="card shadow border-0" style="background-color: var(--surface-light);">
                <div class="card-body py-5">
                    <i class="fas fa-check-circle text-success mb-4" style="font-size: 5rem;"></i>
                    <h2 class="text-white mb-3">Payment Successful!</h2>
                    <p class="text-muted mb-4">Your tickets have been successfully booked and secured.</p>
                    
                    <a href="{% url 'profile' %}" class="btn btn-primary btn-lg rounded-pill px-5">
                        View My Tickets
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
